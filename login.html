<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Form</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">
  <!-- Card -->
  <div class="bg-white w-[500px] rounded-3xl p-8 shadow-lg">

    <!-- Icon -->
    <div class="flex justify-center">
      <div class="bg-blue-100 p-4 rounded-2xl">
        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-7 h-7 text-blue-600"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 11c1.657 0 3-1.343 3-3V7a3 3 0 10-6 0v1c0 1.657 1.343 3 3 3zm-7 9h14a2 2 0 002-2v-5a2 2 0 00-2-2H5a2 2 0 00-2 2v5a2 2 0 002 2z"/>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <div class="text-center mt-6">
      <h1 class="text-3xl font-bold text-gray-900">
        Welcome Back
      </h1>

      <p class="text-gray-400 text-sm mt-2">
        Enter your credentials to access your account
      </p>
    </div>

    <!-- Form -->
    <form class="mt-8 space-y-5">

      <!-- Email -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Email Address
        </label>

        <input type="email"
               placeholder=""
               class="w-full border border-gray-200 rounded-xl px-4 py-3
                      outline-none focus:ring-2
                      bg-gray-50 text-sm">
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Password
        </label>

        <div class="relative">
          <input type="password"
                 placeholder=""
                 class="w-full border border-gray-200 rounded-xl px-4 py-3
                        outline-none focus:ring-2 focus:ring-blue-500
                        bg-gray-50 text-sm">

          <!-- Purple Dot -->
          <!-- <span class="absolute left-0 top-1/2 -translate-y-1/2
                       -ml-2 w-3 h-3 bg-purple-500 rounded-full">
          </span> -->
        </div>
      </div>

      <!-- Remember + Forgot -->
      <div class="flex items-center justify-between text-sm">
        
        <label class="flex items-center gap-2 text-gray-500">
          <input type="checkbox"
                 class="rounded border-gray-300">
          Remember me
        </label>

        <a href="#"
           class="text-blue-600 font-medium hover:underline">
          Forgot password?
        </a>
      </div>

      <!-- Button -->
      <button class="w-full bg-blue-600 hover:bg-blue-700
                     text-white font-semibold py-3 rounded-xl
                     shadow-md transition duration-300
                     flex items-center justify-center gap-2">

        Log In

        <span>➜</span>
      </button>

    </form>

    <!-- Bottom Text -->
    <p class="text-center text-gray-400 text-sm mt-7">
      Don't have an account yet?
      <a href="register.html" class="text-blue-600 font-semibold hover:underline">
        Sign up for free
      </a>
    </p>

  </div>

</body>
</html>
